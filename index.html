<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body {
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    canvas {
      background: #ddd;
      border: 3px solid #333;
    }
    #score {
      position: absolute;
      top: 20px;
      color: white;
      font-size: 24px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>
  <div id="score">Score: 0</div>
  <canvas id="game" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("score");

    const scale = 20;
    const rows = canvas.height / scale;
    const cols = canvas.width / scale;

    let snake = [{ x: 10, y: 10 }];
    let food = randomFood();
    let dx = 0;
    let dy = 0;
    let score = 0;
    let gameOver = false;

    // Draw grid
    function drawGrid() {
      ctx.strokeStyle = "#bbb";
      for (let i = 0; i < rows; i++) {
        for (let j = 0; j < cols; j++) {
          ctx.strokeRect(j * scale, i * scale, scale, scale);
        }
      }
    }

    // Random food
    function randomFood() {
      return {
        x: Math.floor(Math.random() * cols),
        y: Math.floor(Math.random() * rows),
      };
    }

    // Draw snake part with rounded edges
    function drawSnakePart(x, y, color, radius = 6) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x * scale, y * scale, scale, scale, radius);
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      // Draw food
      ctx.fillStyle = "red";
      ctx.fillRect(food.x * scale, food.y * scale, scale, scale);

      // Draw snake body
      snake.forEach((part, i) => {
        if (i === 0) {
          drawSnakePart(part.x, part.y, "darkgreen", 10); // Head
        } else if (i === snake.length - 1) {
          drawSnakePart(part.x, part.y, "green", 4); // Tail
        } else {
          drawSnakePart(part.x, part.y, "green", 6); // Body
        }
      });
    }

    function update() {
      if (gameOver) return;

      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      // Collision with wall
      if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
        endGame();
        return;
      }

      // Collision with itself
      if (snake.some(part => part.x === head.x && part.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      // Eating food
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreText.innerText = "Score: " + score;
        food = randomFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      gameOver = true;
      alert("Game Over! Final Score: " + score);
    }

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp" && dy !== 1) {
        dx = 0;
        dy = -1;
      }
      if (e.key === "ArrowDown" && dy !== -1) {
        dx = 0;
        dy = 1;
      }
      if (e.key === "ArrowLeft" && dx !== 1) {
        dx = -1;
        dy = 0;
      }
      if (e.key === "ArrowRight" && dx !== -1) {
        dx = 1;
        dy = 0;
      }
    });

    setInterval(update, 120);
  </script>
</body>
</html>
