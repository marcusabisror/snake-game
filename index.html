<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body { 
      background: #222; 
      display: flex; 
      flex-direction: column;
      justify-content: flex-start; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      color: white;
      font-family: Arial;
    }

    #controls {
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }

    select, button {
      padding: 5px 10px;
      font-size: 14px;
    }

    #top-bar {
      width: 400px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    canvas { background: #111; }
    #score { font-size: 18px; }
  </style>
</head>
<body>

  <div id="controls">
    <label>Speed:</label>
    <select id="speed">
      <option value="200">Beginner</option>
      <option value="120" selected>Moderate</option>
      <option value="70">Pro</option>
    </select>

    <label>Board Size:</label>
    <select id="board">
      <option value="15">15×15</option>
      <option value="20" selected>20×20</option>
      <option value="25">25×25</option>
      <option value="30">30×30</option>
    </select>

    <button id="start">Start Game</button>
  </div>

  <div id="top-bar">
    <div id="score">Score: 0</div>
    <button id="restart" style="display:none;">Restart</button>
  </div>

  <canvas id="game" width="400" height="400"></canvas>

  <script>
    let canvas, ctx;
    let scale, rows, cols;
    let snake, food, dx, dy;
    let gameInterval = null;
    let score = 0;
    let boardSize = 20;

    // Setup new game
    function setupGame() {
      canvas = document.getElementById('game');
      ctx = canvas.getContext('2d');

      boardSize = Number(document.getElementById('board').value);
      scale = 400 / boardSize;
      rows = cols = boardSize;

      snake = [{ x: Math.floor(cols / 2), y: Math.floor(rows / 2) }];
      dx = 0;
      dy = 0;
      score = 0;
      document.getElementById('score').innerText = "Score: 0";

      placeFood();
      draw();
    }

    // Random food
    function placeFood() {
      food = {
        x: Math.floor(Math.random() * cols),
        y: Math.floor(Math.random() * rows)
      };
    }

    // Draw grid lines
    function drawGrid() {
      ctx.strokeStyle = "#333";
      for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
          ctx.strokeRect(x * scale, y * scale, scale, scale);
        }
      }
    }

    // Draw everything
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      // Food
      ctx.fillStyle = "red";
      ctx.fillRect(food.x * scale, food.y * scale, scale, scale);

      // Snake
      snake.forEach((part, i) => {
        ctx.fillStyle = (i === 0) ? "green" : "lime";
        ctx.fillRect(part.x * scale, part.y * scale, scale, scale);
      });
    }

    // Game loop update
    function update() {
      if (dx === 0 && dy === 0) {
        draw();
        return;
      }

      const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
      };

      // Wall Collision
      if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
        return gameOver();
      }

      // Self collision
      if (snake.some(part => part.x === head.x && part.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById('score').innerText = "Score: " + score;

        if (score >= cols * rows - 1) {
          return winGame();
        }

        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function gameOver() {
      clearInterval(gameInterval);
      document.getElementById('restart').style.display = "block";
      alert("Game Over!");
    }

    function winGame() {
      clearInterval(gameInterval);
      document.getElementById('restart').style.display = "block";
      alert("You filled the whole board — YOU WIN!");
    }

    // Controls
    window.addEventListener('keydown', (e) => {
      if (e.key === "ArrowUp" && dy !== 1)    { dx = 0; dy = -1; }
      if (e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; }
      if (e.key === "ArrowLeft" && dx !== 1)  { dx = -1; dy = 0; }
      if (e.key === "ArrowRight" && dx !== -1){ dx = 1; dy = 0; }
    });

    // Start button
    document.getElementById('start').onclick = () => {
      clearInterval(gameInterval);
      setupGame();
      const speed = Number(document.getElementById('speed').value);
      gameInterval = setInterval(update, speed);
      document.getElementById('restart').style.display = "none";
    };

    // Restart button
    document.getElementById('restart').onclick = () => {
      clearInterval(gameInterval);
      setupGame();
      const speed = Number(document.getElementById('speed').value);
      gameInterval = setInterval(update, speed);
      document.getElementById('restart').style.display = "none";
    };
  </script>
</body>
</html>
