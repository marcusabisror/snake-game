<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body {
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    canvas {
      background: #ddd;
      border: 3px solid #333;
    }
    #score {
      position: absolute;
      top: 20px;
      color: white;
      font-size: 24px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>
  <div id="score">Score: 0</div>
  <canvas id="game" width="400" height="400"></canvas>

  <script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreText = document.getElementById("score");

  const scale = 20;
  const rows = canvas.height / scale;
  const cols = canvas.width / scale;
  const totalCells = rows * cols; // <-- important

  let snake = [{ x: 10, y: 10 }];
  let food = randomFood();
  let dx = 0;
  let dy = 0;
  let score = 0;
  let gameOver = false;
  let started = false;

  function drawGrid() {
    ctx.strokeStyle = "#bbb";
    for (let i = 0; i < rows; i++) {
      for (let j = 0; j < cols; j++) {
        ctx.strokeRect(j * scale, i * scale, scale, scale);
      }
    }
  }

  function randomFood() {
    return {
      x: Math.floor(Math.random() * cols),
      y: Math.floor(Math.random() * rows),
    };
  }

  function drawSnakePart(x, y, color, radius = 6) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x * scale, y * scale, scale, scale, radius);
    ctx.fill();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();

    ctx.fillStyle = "red";
    ctx.fillRect(food.x * scale, food.y * scale, scale, scale);

    snake.forEach((part, i) => {
      if (i === 0) {
        drawSnakePart(part.x, part.y, "darkgreen", 10);
      } else if (i === snake.length - 1) {
        drawSnakePart(part.x, part.y, "green", 4);
      } else {
        drawSnakePart(part.x, part.y, "green", 6);
      }
    });
  }

  function update() {
    if (gameOver) return;

    if (!started) {
      draw();
      return;
    }

    const head = { x: snake[0].x + dx, y: snake[0].y + dy };

    // Hit wall?
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
      return endGame("Game Over! Final Score: " + score);
    }

    // Hit itself?
    if (snake.some(p => p.x === head.x && p.y === head.y)) {
      return endGame("Game Over! Final Score: " + score);
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreText.innerText = "Score: " + score;
      food = randomFood();
    } else {
      snake.pop();
    }

    // 🏆 WIN CONDITION
    if (snake.length === totalCells) {
      return endGame("YOU WIN! You filled the entire board!");
    }

    draw();
  }

  function endGame(message) {
    gameOver = true;
    setTimeout(() => alert(message), 10);
  }

  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp" && dy !== 1) {
      dx = 0; dy = -1; started = true;
    }
    if (e.key === "ArrowDown" && dy !== -1) {
      dx = 0; dy = 1; started = true;
    }
    if (e.key === "ArrowLeft" && dx !== 1) {
      dx = -1; dy = 0; started = true;
    }
    if (e.key === "ArrowRight" && dx !== -1) {
      dx = 1; dy = 0; started = true;
    }
  });

  setInterval(update, 120);
</script>
</body>
</html>
