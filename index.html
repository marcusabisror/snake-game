<!DOCTYPE html>
<html>
<head>
<title>Snake Game</title>
<style>
body {
  background:#222;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:white;
  font-family:Arial;
}

#controls { margin:10px; }
canvas { background:#111; }

.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  top:0; left:0;
  z-index:999;
}
.modal-content {
  background:#222;
  padding:20px;
  margin:10% auto;
  width:300px;
  text-align:center;
  border-radius:10px;
}

#game-over-overlay {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  display:none;
}
</style>
</head>

<body>

<div id="controls">
Speed:
<select id="speed">
<option value="300">Beginner</option>
<option value="200" selected>Moderate</option>
<option value="120">Pro</option>
</select>

Board:
<select id="board">
<option value="18">18</option>
<option value="15">15</option>
<option value="10">10</option>
<option value="7">7</option>
</select>

<button id="start">Start</button>
<button id="pauseBtn">Pause</button>
<button id="howBtn">How To Play</button>
</div>

<div id="score">Score: 0</div>

<div style="position:relative">
<canvas id="game" width="400" height="400"></canvas>
<div id="game-over-overlay"></div>
</div>

<!-- CONTINUE MODAL -->
<div id="continueModal" class="modal">
<div class="modal-content">
<h2>Continue?</h2>
<p id="continueText"></p>
<button id="watchAd">Watch Ad</button><br><br>
<button id="useKey">Use Key</button><br><br>
<button id="buyKey">Buy Keys</button><br><br>
<button id="endGame">End Game</button>
</div>
</div>

<!-- HOW TO PLAY -->
<div id="howModal" class="modal">
<div class="modal-content">
<h2>How To Play</h2>
<p>
Goal: Fill the entire grid.<br><br>
Use arrow keys to move.<br>
Avoid walls and yourself.<br><br>
You can continue after losing using ads or keys.
</p>
<button onclick="closeHow()">Close</button>
</div>
</div>

<script>

/* SOUNDS */
const eatSound = new Audio("sounds/eat_beep.wav");
const eat10Sound = new Audio("sounds/eat10.wav");
const winSound = new Audio("sounds/win.wav");
const gameOverSound = new Audio("sounds/game_over.wav");
const bgm = new Audio("sounds/bg_loop.wav");
bgm.loop = true;

/* STATE */
let canvas, ctx, scale, rows, cols;
let snake, food, dx, dy, score;
let gameInterval;
let paused = false;

/* CONTINUE SYSTEM */
let savedState = null;
let continuesUsed = 0;
let maxContinues = 0;
let playerKeys = 0;

/* SETUP */
function setupGame(){
canvas = document.getElementById("game");
ctx = canvas.getContext("2d");

let size = Number(document.getElementById("board").value);
scale = 400/size;
rows=cols=size;

if(size==7) maxContinues=1;
else if(size==10) maxContinues=2;
else if(size==15) maxContinues=3;
else maxContinues=4;

continuesUsed=0;

snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];
dx=0; dy=0; score=0;
paused=false;

document.getElementById("score").innerText="Score: 0";
document.getElementById("game-over-overlay").style.display="none";

placeFood();
draw();
}

/* FOOD */
function placeFood(){
food={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)};
}

/* GRID */
function drawGrid(){
ctx.strokeStyle="#333";
for(let x=0;x<cols;x++){
for(let y=0;y<rows;y++){
ctx.strokeRect(x*scale,y*scale,scale,scale);
}}
}

/* DRAW */
function draw(){
ctx.clearRect(0,0,400,400);
drawGrid();

ctx.fillStyle="red";
ctx.fillRect(food.x*scale,food.y*scale,scale,scale);

snake.forEach((p,i)=>{
ctx.fillStyle=i==0?"green":"lime";
ctx.fillRect(p.x*scale,p.y*scale,scale,scale);
});
}

/* UPDATE */
function update(){

if(paused) return;

savedState={
snake:JSON.parse(JSON.stringify(snake)),
food:{...food},
dx,dy,score,
speed:Number(document.getElementById("speed").value)
};

if(dx==0&&dy==0) return;

let head={x:snake[0].x+dx,y:snake[0].y+dy};

if(head.x<0||head.x>=cols||head.y<0||head.y>=rows) return gameOver();
if(snake.slice(1).some(p=>p.x==head.x&&p.y==head.y)) return gameOver();

snake.unshift(head);

if(head.x==food.x&&head.y==food.y){
score++;

if(score%10==0) eat10Sound.play();
else eatSound.play();

document.getElementById("score").innerText="Score: "+score;

if(score>=cols*rows-1) return winGame();

placeFood();
}else{
snake.pop();
}

draw();
}

/* GAME OVER */
function gameOver(){
clearInterval(gameInterval);
gameOverSound.play();

document.getElementById("game-over-overlay").innerText="GAME OVER";
document.getElementById("game-over-overlay").style.display="block";

if(continuesUsed<maxContinues){
document.getElementById("continueText").innerText=
"Continues left: "+(maxContinues-continuesUsed);
document.getElementById("continueModal").style.display="block";
}
}

/* CONTINUE */
function continueGame(){
snake=JSON.parse(JSON.stringify(savedState.snake));
food={...savedState.food};
dx=savedState.dx;
dy=savedState.dy;
score=savedState.score;

document.getElementById("score").innerText="Score: "+score;

document.getElementById("continueModal").style.display="none";
document.getElementById("game-over-overlay").style.display="none";

paused=true;

gameInterval=setInterval(update,savedState.speed);
}

document.getElementById("watchAd").onclick=()=>{
setTimeout(()=>{
continuesUsed++;
continueGame();
},1000);
};

document.getElementById("useKey").onclick=()=>{
if(playerKeys>0){
playerKeys--;
continuesUsed++;
continueGame();
}
};

document.getElementById("buyKey").onclick=()=>{
playerKeys+=5;
};

document.getElementById("endGame").onclick=()=>{
document.getElementById("continueModal").style.display="none";
};

/* WIN */
function winGame(){
clearInterval(gameInterval);
winSound.play();

document.getElementById("game-over-overlay").innerText="🎉 YOU WIN 🎉";
document.getElementById("game-over-overlay").style.display="block";
}

/* CONTROLS */
window.addEventListener("keydown",(e)=>{

  // STOP browser default behavior (THIS FIXES RESTART BUG)
  if(e.key === " ") {
    e.preventDefault();
    paused = !paused;
    return;
  }

  if(paused) return;

  if(e.key=="ArrowUp"&&dy!=1){dx=0;dy=-1;}
  if(e.key=="ArrowDown"&&dy!=-1){dx=0;dy=1;}
  if(e.key=="ArrowLeft"&&dx!=1){dx=-1;dy=0;}
  if(e.key=="ArrowRight"&&dx!=-1){dx=1;dy=0;}
});
/* BUTTONS */
document.getElementById("pauseBtn").onclick=()=>paused=!paused;

document.getElementById("start").onclick=()=>{
clearInterval(gameInterval);
setupGame();
let speed=Number(document.getElementById("speed").value);
gameInterval=setInterval(update,speed);
bgm.play();
};

document.getElementById("howBtn").onclick=()=>{
document.getElementById("howModal").style.display="block";
};

function closeHow(){
document.getElementById("howModal").style.display="none";
}

</script>
</body>
</html>
